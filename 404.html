    <script>
        // Apply stored theme before first paint to avoid flash
        (function () {
            try {
                const stored = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = stored || (prefersDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();

        tailwind.config = {
            darkMode: ['class', '[data-theme="dark"]'],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg: #f6f9f9;
            --bg-grad-1: #eef5f5;
            --bg-grad-2: #f8fbfb;
            --surface: #ffffff;
            --surface-2: #fafbfb;
            --surface-muted: #f3f6f6;
            --border: rgba(0, 139, 139, 0.10);
            --border-strong: rgba(0, 139, 139, 0.20);
            --text: #0f1f22;
            --text-muted: #4b5563;
            --text-faint: #6b7280;
            --text-dim: #9ca3af;
            --accent: #008B8B;
            --accent-2: #20B2AA;
            --accent-strong: #0f766e;
            --accent-soft: rgba(0, 139, 139, 0.08);
            --accent-softer: rgba(0, 139, 139, 0.04);
            --shadow-sm: 0 1px 2px rgba(0, 30, 30, 0.04);
            --shadow: 0 4px 20px rgba(0, 90, 90, 0.07), 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 40px rgba(0, 90, 90, 0.12);
            --header-grad: linear-gradient(135deg, #008B8B 0%, #0f766e 55%, #115e59 100%);
            --footer-grad: linear-gradient(135deg, #0f766e 0%, #008B8B 100%);
        }
        [data-theme="dark"] {
            --bg: #0a1416;
            --bg-grad-1: #0d1a1d;
            --bg-grad-2: #0a1416;
            --surface: #111e21;
            --surface-2: #152427;
            --surface-muted: #0f1b1e;
            --border: rgba(45, 212, 191, 0.12);
            --border-strong: rgba(45, 212, 191, 0.25);
            --text: #e6edf0;
            --text-muted: #b8c4c8;
            --text-faint: #8a9699;
            --text-dim: #6b7578;
            --accent: #2dd4bf;
            --accent-2: #5eead4;
            --accent-strong: #14b8a6;
            --accent-soft: rgba(45, 212, 191, 0.10);
            --accent-softer: rgba(45, 212, 191, 0.05);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.35), 0 1px 3px rgba(0, 0, 0, 0.25);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
            --header-grad: linear-gradient(135deg, #0a1416 0%, #0f2629 60%, #0a1416 100%);
            --footer-grad: linear-gradient(135deg, #0a1416 0%, #0f2629 100%);
        }

        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        html { scroll-behavior: smooth; }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, var(--accent-soft), transparent 60%),
                linear-gradient(180deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            background-attachment: fixed;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        [data-theme="dark"] body {
            background-image:
                radial-gradient(ellipse 60% 40% at 50% -5%, rgba(45, 212, 191, 0.08), transparent 60%),
                radial-gradient(ellipse 40% 30% at 85% 110%, rgba(45, 212, 191, 0.05), transparent 60%),
                linear-gradient(180deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
        }

        .content-container {
            display: flex;
            flex-grow: 1;
            justify-content: center;
            align-items: flex-start;
            padding: 2.5rem;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }
        .sidebar {
            background: var(--surface);
            border-radius: 1rem;
            box-shadow: var(--shadow);
            padding: 1rem;
            width: 220px;
            border: 1px solid var(--border);
            position: sticky;
            top: 1.5rem;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .main-content {
            background: var(--surface);
            border-radius: 1rem;
            box-shadow: var(--shadow);
            padding: 2.25rem;
            width: 100%;
            max-width: 820px;
            border: 1px solid var(--border);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        /* Header */
        header {
            background: var(--header-grad);
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 139, 139, 0.18);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }
        [data-theme="dark"] header {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--border-strong);
        }
        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.7;
        }
        header h1 {
            position: relative;
            z-index: 1;
            font-size: 1.625rem;
            letter-spacing: -0.02em;
            font-weight: 700;
        }
        .header-actions {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 0.5rem;
            z-index: 2;
        }
        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 0.625rem;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.12);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: scale(1.05);
        }
        .theme-toggle svg { width: 18px; height: 18px; }
        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: block; }
        [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
        [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

        /* Footer */
        footer {
            background: var(--footer-grad);
            color: white;
            padding: 1.25rem;
            text-align: center;
            margin-top: auto;
            font-size: 0.875rem;
            opacity: 0.95;
            transition: background 0.3s ease;
        }
        [data-theme="dark"] footer {
            border-top: 1px solid var(--border-strong);
            color: var(--text-muted);
        }

        /* Nav */
        .nav-button {
            width: 100%;
            text-align: left;
            padding: 0.7rem 0.95rem;
            margin-bottom: 0.25rem;
            border-radius: 0.625rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            font-size: 0.9375rem;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid transparent;
            cursor: pointer;
            position: relative;
        }
        .nav-button:hover {
            background: var(--accent-soft);
            color: var(--accent);
            transform: translateX(2px);
        }
        .nav-button.active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(0, 139, 139, 0.28);
        }
        [data-theme="dark"] .nav-button.active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            color: #0a1416;
            box-shadow: 0 4px 14px rgba(45, 212, 191, 0.25);
        }

        /* Bio */
        .profile-image {
            float: right;
            margin-left: 2rem;
            margin-bottom: 1rem;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            object-fit: cover;
            box-shadow: 0 8px 30px rgba(0, 139, 139, 0.18),
                        0 0 0 4px var(--surface),
                        0 0 0 6px var(--border-strong);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .profile-image:hover {
            transform: scale(1.03) rotate(-1deg);
            box-shadow: 0 12px 40px rgba(0, 139, 139, 0.25),
                        0 0 0 4px var(--surface),
                        0 0 0 8px var(--border-strong);
        }

        .name-gradient {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        /* Social */
        .social-link {
            color: var(--accent);
            font-weight: 600;
            transition: all 0.25s ease;
            text-decoration: none;
            position: relative;
        }
        .social-link:hover { color: var(--accent-strong); }
        .social-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            transition: width 0.3s ease;
        }
        .social-link:hover::after { width: 100%; }

        .social-icons {
            display: flex;
            gap: 0.6rem;
            margin-top: 1.1rem;
            flex-wrap: wrap;
        }
        .social-icon-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--accent-soft);
            border: 1px solid var(--border-strong);
            border-radius: 2rem;
            color: var(--accent);
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }
        .social-icon-link:hover {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 139, 139, 0.28);
            border-color: transparent;
        }
        [data-theme="dark"] .social-icon-link:hover { color: #0a1416; }
        .social-icon-link svg { width: 18px; height: 18px; }

        /* Cards */
        .research-card,
        .blog-card,
        .education-card {
            background: linear-gradient(135deg, var(--surface-2) 0%, var(--surface-muted) 100%);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .research-card::before,
        .blog-card::before,
        .education-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
        }
        .research-card:hover,
        .blog-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
            border-color: var(--border-strong);
        }
        .education-card {
            margin-top: 2rem;
            margin-bottom: 0;
            padding: 1.25rem 1.5rem;
        }

        /* Timeline */
        .timeline-item {
            border-left: 3px solid var(--accent);
            padding-left: 1.25rem;
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -7px;
            top: 0.75rem;
            width: 11px;
            height: 11px;
            background: var(--surface);
            border: 3px solid var(--accent);
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .timeline-item:hover {
            border-left-color: var(--accent-2);
            background: linear-gradient(90deg, var(--accent-soft) 0%, transparent 100%);
            padding-left: 1.5rem;
            border-radius: 0 0.75rem 0.75rem 0;
        }
        .timeline-item:hover::before {
            background: var(--accent);
            border-color: var(--accent-2);
            transform: scale(1.2);
        }

        /* Buttons */
        .link-button {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.4rem 0.875rem;
            background: var(--surface);
            color: var(--accent);
            border: 1px solid var(--border-strong);
            border-radius: 0.5rem;
            font-size: 0.8125rem;
            font-weight: 500;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            cursor: pointer;
        }
        .link-button:hover {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            color: white;
            border-color: transparent;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 139, 139, 0.25);
        }
        [data-theme="dark"] .link-button:hover { color: #0a1416; }

        .ghost-button {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.85rem;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-strong);
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            text-decoration: none;
        }
        .ghost-button:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        /* Section titles */
        .section-title {
            color: var(--accent);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            position: relative;
            display: inline-block;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 42px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            border-radius: 2px;
        }

        .section-sub {
            color: var(--text-faint);
            font-size: 0.95rem;
            margin-top: -0.4rem;
            margin-bottom: 1.5rem;
        }

        /* Text color helpers that respect theme */
        .t-body { color: var(--text); }
        .t-muted { color: var(--text-muted); }
        .t-faint { color: var(--text-faint); }
        .t-dim { color: var(--text-dim); }

        /* Contact */
        .contact-info {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-faint);
            font-size: 0.9375rem;
        }
        .contact-info a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .contact-info a:hover { text-decoration: underline; }

        /* Blog post reading */
        .post-content {
            color: var(--text);
            font-size: 1rem;
            line-height: 1.75;
        }
        .post-content h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            margin-top: 1.75rem;
            margin-bottom: 0.5rem;
        }
        .post-content p { margin-bottom: 1rem; color: var(--text-muted); }
        .post-content a { color: var(--accent); font-weight: 500; text-decoration: none; border-bottom: 1px solid var(--border-strong); }
        .post-content a:hover { border-bottom-color: var(--accent); }
        .post-content h2 { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-top: 2rem; margin-bottom: 0.75rem; letter-spacing: -0.01em; }
        .post-content h4 { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-top: 1.25rem; margin-bottom: 0.4rem; }
        .post-content ul, .post-content ol { margin: 0.75rem 0 1.25rem; padding-left: 1.5rem; color: var(--text-muted); }
        .post-content ul { list-style: disc; }
        .post-content ol { list-style: decimal; }
        .post-content li { margin-bottom: 0.35rem; }
        .post-content li::marker { color: var(--accent); }
        .post-content blockquote {
            border-left: 3px solid var(--accent);
            padding: 0.25rem 0 0.25rem 1rem;
            margin: 1rem 0;
            color: var(--text-faint);
            font-style: italic;
            background: var(--accent-softer);
            border-radius: 0 0.5rem 0.5rem 0;
        }
        .post-content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
        .post-content img { max-width: 100%; border-radius: 0.75rem; margin: 1rem 0; border: 1px solid var(--border); }
        .post-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .post-content th, .post-content td { border: 1px solid var(--border); padding: 0.5rem 0.75rem; text-align: left; }
        .post-content th { background: var(--surface-muted); color: var(--text); font-weight: 600; }
        .post-content strong { color: var(--text); font-weight: 600; }
        .post-content code {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            background: var(--accent-soft);
            color: var(--accent);
            padding: 0.1rem 0.4rem;
            border-radius: 0.3rem;
            font-size: 0.875em;
        }
        .post-content pre {
            background: var(--surface-muted);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .post-content pre code {
            background: transparent;
            color: var(--text);
            padding: 0;
        }
        .post-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-faint);
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
        }
        .post-meta .dot {
            width: 4px; height: 4px; background: var(--text-dim); border-radius: 50%;
        }

        /* Byline / authors */
        .byline {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
        }
        .byline .avatars {
            display: inline-flex;
        }
        .author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            overflow: hidden;
            border: 2px solid var(--surface);
            margin-left: -6px;
            flex-shrink: 0;
        }
        .author-avatar:first-child { margin-left: 0; }
        .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
        [data-theme="dark"] .author-avatar { color: #0a1416; }

        .byline .name { color: var(--text-muted); font-weight: 500; }
        .byline a.author-link {
            color: var(--text-muted);
            text-decoration: none;
            border-bottom: 1px dashed var(--border-strong);
            transition: color 0.2s ease, border-color 0.2s ease;
        }
        .byline a.author-link:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .post-header-byline .author-avatar { width: 32px; height: 32px; font-size: 0.75rem; }
        .post-header-byline { font-size: 0.95rem; margin-bottom: 0.5rem; }

        /* Animations */
        .fade-in { animation: fadeIn 0.45s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Burger */
        .burger-menu { display: none; }

        @media (max-width: 768px) {
            .content-container {
                flex-direction: column;
                padding: 1rem;

    <script>
        // ============================================================
        // BLOG POSTS
        // To add a post:
        //   1. Drop `my-post.md` (or `.html`) into /blogs
        //   2. Add "my-post.md" to /blogs/manifest.json
        // Markdown files may start with a YAML-ish frontmatter block:
        //   ---
        //   title: My Post
        //   date: 2026-04-13
        //   excerpt: One-line description for the list view.
        //   readingTime: 3 min read

        // Author registry — add entries here for co-authors so their avatar/link renders.
        // If an author isn't listed here, initials are shown instead of an avatar.
        const AUTHORS = {
            'Atakan Tekparmak': { avatar: '/twitter_avatar.jpg', url: 'https://x.com/AtakanTekparmak' },
            'Claude 4.6 Opus (Claude Code)': { url: 'https://claude.com/claude-code', initials: 'C' }
        };

        function renderByline(authors, { compact = true } = {}) {
            const list = (authors && authors.length) ? authors : ['Atakan Tekparmak'];
            const avatars = list.map(name => {
                const info = AUTHORS[name];
                if (info && info.avatar) {
                    return `<span class="author-avatar"><img src="${info.avatar}" alt="${name}"></span>`;
                }
                const initials = (info && info.initials)
                    ? info.initials
                    : name.split(/\s+/).filter(Boolean).slice(0, 2).map(p => p[0]).join('').toUpperCase();
                return `<span class="author-avatar">${initials}</span>`;
            }).join('');
            const names = list.map(name => {
                const info = AUTHORS[name];
                return (info && info.url)
                    ? `<a href="${info.url}" target="_blank" rel="noopener" class="author-link">${name}</a>`
                    : name;
            }).join(', ');
            return `<span class="byline"><span class="avatars">${avatars}</span><span class="name">${names}</span></span>`;
        }

        let postsCache = null;

        function parseFrontmatter(text) {
            const m = text.match(/^---\s*\r?\n([\s\S]*?)\r?\n---\s*\r?\n?([\s\S]*)$/);
            if (!m) return { meta: {}, body: text };
            const meta = {};
            for (const line of m[1].split(/\r?\n/)) {
                const kv = line.match(/^([A-Za-z_][\w-]*)\s*:\s*(.*)$/);
                if (kv) meta[kv[1]] = kv[2].trim().replace(/^["'](.*)["']$/, '$1');
            }
            return { meta, body: m[2] };
        }

        // Resolves `<!-- include: path/to/file -->` directives by fetching the referenced
        // file under blogs/ and splicing its contents in. Lets posts keep large HTML
        // artifacts (diagrams, charts) out of the markdown.
        async function resolveIncludes(text) {
            const re = /<!--\s*include:\s*(\S+?)\s*-->/g;
            const matches = [...text.matchAll(re)];
            if (matches.length === 0) return text;
            const fetched = await Promise.all(matches.map(async m => {
                try {
                    const r = await fetch('/blogs/' +m[1], { cache: 'no-cache' });
                    if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
                    return await r.text();
                } catch (e) {
                    return `<!-- include failed: ${m[1]} (${e.message}) -->`;
                }
            }));
            let out = '';
            let cursor = 0;
            matches.forEach((m, i) => {
                out += text.slice(cursor, m.index) + fetched[i];
                cursor = m.index + m[0].length;
            });
            out += text.slice(cursor);
            return out;
        }

        async function loadPost(file) {
            const res = await fetch('/blogs/' +file, { cache: 'no-cache' });
            if (!res.ok) throw new Error('Failed to load ' + file);
            const text = await res.text();
            const { meta, body } = parseFrontmatter(text);
            const ext = (file.split('.').pop() || '').toLowerCase();
            const resolved = await resolveIncludes(body);
            const content = ext === 'md' ? marked.parse(resolved) : resolved;
            const slug = meta.slug || file.replace(/\.(md|html?)$/i, '');
            const authorsStr = meta.authors || meta.author || '';
            const authors = authorsStr.split(',').map(s => s.trim()).filter(Boolean);
            return {
                slug,
                file,
                ext,
                content,
                title: meta.title || slug,
                date: meta.date || '',
                excerpt: meta.excerpt || '',
                readingTime: meta.readingTime || meta.reading_time || '',
                authors
            };
        }

        async function getPosts() {
            if (postsCache) return postsCache;
            const res = await fetch('/blogs/manifest.json', { cache: 'no-cache' });
            if (!res.ok) throw new Error('Could not load blogs/manifest.json');
            const files = await res.json();
            const loaded = await Promise.all(files.map(loadPost));
            loaded.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            postsCache = loaded;
            return loaded;
        }

        function formatDate(iso) {
            try {
                const d = new Date(iso + 'T00:00:00');

            blog: async () => {
                let posts = [];
                let error = null;
                try {
                    posts = await getPosts();
                } catch (e) {
                    error = e.message || String(e);
                }

                if (error) {
                    return `
                        <div class="fade-in">
                            <h2 class="section-title">Blog</h2>
                            <p class="section-sub" style="color: #b91c1c">Couldn't load posts: ${error}</p>
                        </div>
                    `;
                }
                if (posts.length === 0) {
                    return `
                        <div class="fade-in">
                            <h2 class="section-title">Blog</h2>
                            <p class="section-sub">Nothing here yet — check back soon.</p>
                        </div>
                    `;
                }
                const items = posts.map(p => `
                    <article class="blog-card" onclick="showPost('${p.slug}')" style="cursor:pointer">
                        <h3 class="text-lg font-semibold t-body">${p.title}</h3>
                        <div class="post-meta mt-1">
                            ${renderByline(p.authors)}
                            <span class="dot"></span>
                            <span>${formatDate(p.date)}</span>
                            ${p.readingTime ? `<span class="dot"></span><span>${p.readingTime}</span>` : ''}
                        </div>
                        <p class="t-muted text-sm leading-relaxed">${p.excerpt}</p>
                        <div class="mt-3">
                            <span class="link-button" style="pointer-events:none">Read →</span>
                        </div>
                    </article>
                `).join('');
                return `
                    <div class="fade-in">
                        <h2 class="section-title">Blog</h2>
                        <p class="section-sub">Notes on research, agents, and whatever else I'm thinking about.</p>
                        ${items}
                    </div>
                `;
            }
        };

        function renderLoading(label) {
            return `
                <div class="fade-in">
                    <h2 class="section-title">${label}</h2>
                    <p class="section-sub">Loading…</p>
                </div>
            `;
        }

        function setActiveNav(sectionId) {
            document.querySelectorAll('.nav-button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.section === sectionId);
            });
        }

        // URL helpers — blog is path-based (so per-post HTML shells with OG meta
        // can serve direct loads to crawlers). Other sections stay hash-based.
        function urlForSection(id) {
            if (id === 'blog') return '/blog/';
            if (id === 'bio') return '/';
            return '/#' + id;
        }
        function urlForPost(slug) { return '/blog/' + slug + '/'; }

        async function showSection(sectionId, opts = {}) {
            const render = sections[sectionId];
            if (!render) return;
            setActiveNav(sectionId);
            if (!opts.fromRoute) {
                const target = urlForSection(sectionId);
                if (target !== location.pathname + location.hash) {
                    history.pushState(null, '', target);
                }
            }

            const content = document.getElementById('content');
            const result = render();
            if (result && typeof result.then === 'function') {
                content.innerHTML = renderLoading(sectionId === 'blog' ? 'Blog' : '');
                content.innerHTML = await result;
            } else {
                content.innerHTML = result;
            }

            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').style.display = 'none';
                document.getElementById('burger-icon').innerHTML = '&#9776;';
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function showPost(slug, opts = {}) {
            setActiveNav('blog');
            if (!opts.fromRoute) {
                const target = urlForPost(slug);
                if (target !== location.pathname) {
                    history.pushState(null, '', target);
                }
            }
            const content = document.getElementById('content');
            content.innerHTML = renderLoading('');
            let posts;
            try {
                posts = await getPosts();
            } catch (e) {
                content.innerHTML = `<div class="fade-in"><p class="section-sub" style="color:#b91c1c">Couldn't load post: ${e.message || e}</p></div>`;
                return;
            }
            const p = posts.find(x => x.slug === slug);
            if (!p) { showSection('blog'); return; }
            content.innerHTML = `
                <div class="fade-in">
                    <div class="mb-4"><button class="ghost-button" onclick="showSection('blog')">← All posts</button></div>
                    <h2 class="section-title" style="font-size: 2rem">${p.title}</h2>
                    <div class="post-meta post-header-byline">
                        ${renderByline(p.authors)}
                    </div>
                    <div class="post-meta" style="margin-top:-0.35rem">
                        <span>${formatDate(p.date)}</span>
                        ${p.readingTime ? `<span class="dot"></span><span>${p.readingTime}</span>` : ''}
                    </div>
                    <div class="post-content">${p.content}</div>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('burger-icon');
            const open = sidebar.style.display === 'block';
            sidebar.style.display = open ? 'none' : 'block';
            icon.innerHTML = open ? '&#9776;' : '&times;';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            try { localStorage.setItem('theme', next); } catch (e) {}
        }

        // Routing: blog uses path (/blog/, /blog/<slug>/), other sections use hash.
        // Old hash URLs (#blog, #blog/<slug>) are redirected to the new paths so
        // existing links keep working.
        function resolveRoute() {
            // Backwards-compat: redirect legacy hash URLs to paths.
            const hash = location.hash.slice(1);
            if (hash === 'blog' || hash.startsWith('blog/')) {
                const newPath = hash === 'blog' ? '/blog/' : '/blog/' + hash.slice('blog/'.length) + '/';
                history.replaceState(null, '', newPath);
                return resolveRoute();
            }

            const path = location.pathname.replace(/\/$/, '');
            const postMatch = path.match(/^\/blog\/([^\/]+)$/);
            if (postMatch) return { kind: 'post', slug: postMatch[1] };
            if (path === '/blog') return { kind: 'section', id: 'blog' };

            // Section by hash on root.
            if (sections[hash]) return { kind: 'section', id: hash };
            return { kind: 'section', id: 'bio' };
        }

        async function applyRoute() {
            const route = resolveRoute();
            if (route.kind === 'post') {
                await showPost(route.slug, { fromRoute: true });
            } else {
                await showSection(route.id, { fromRoute: true });
            }
        }

        window.addEventListener('popstate', applyRoute);
        window.addEventListener('hashchange', applyRoute);
        applyRoute();
    </script>
</body>
</html>
